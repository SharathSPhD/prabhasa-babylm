# PSALM base run configuration (reference defaults).
# Every field maps to psalm.config.settings.ExperimentConfig. Arm configs under
# configs/phase2/ override only what differs, so comparisons stay matched.
phase: phase-2-h1
arm_id: B

model:
  name: psalm-100m
  param_count_m: 100.0
  n_layers: 12
  n_heads: 12
  d_model: 768
  vocab_size: 32000
  max_seq_len: 1024

data:
  pre_pretrain_source: paninian   # none | paninian | dyck | paninian_karaka_aux
  pretrain_corpus: english        # english | sanskrit | sanskrit_english
  word_budget: 100000000          # BabyLM "Strict" 100M-word track
  karaka_aux_loss: false
  tokenizer_path: data/tokenizer/psalm-sp.model

training:
  learning_rate: 3.0e-4
  batch_size: 32
  gradient_accumulation_steps: 1
  max_steps: 10000
  warmup_ratio: 0.02
  weight_decay: 0.1
  max_grad_norm: 1.0
  precision: bf16
  seeds: [0, 1, 2]

evaluation:
  compositional: [scan, cogs, cfq]
  syntactic: [blimp]
  general: [glue, ewok]
  reference: [arc_easy, hellaswag]
  sanskrit: [morphology, sandhi, karaka]

go_no_go:
  token_savings_vs_dyck: 0.20   # H1 primary (pre-registered)
  compositional_gain_points: 3.0
  coverage_threshold: 0.80
  significance_alpha: 0.05
  min_seeds: 3
