workstream_id: vidyut-realize
branch: workstream/vidyut-realize
fork_from: origin/main
purpose: >
  Vidyut-native sentence realization (ADR-0033): frame -> per-pada subanta/tinanta via
  vidyut.prakriya -> order -> forward sandhi -> gold karaka_parse BY CONSTRUCTION.
  Saṃsādhanī demoted to optional offline cross-check.
owns:
  - VidyutFrameRealizer (application/data/ports.SentenceGenerator)
  - role->vibhakti table; WX->(root,gana,lakara) map
  - forward-sandhi table (inverted vidyut-data rules CSV)
  - ROLE_DHATUS transitivity annotation
  - data/fixtures/paninian_v1.jsonl export
depends_on: []
hard_constraints:
  gpu_only: true          # derivation/validation runs on GB10 native; no CPU substitute for reported runs
  no_mock: true           # no fabricated surfaces; sandhi miss => meta.sandhi=partial, never invented
  no_samsadhani_dependency: true
acceptance:               # falsifiable; all must hold at standalone closure
  - id: V-realize-accept
    check: realization acceptance ~100% on n>=2000 real frames (Paninian derivability + agreement validator)
    threshold: ">= 0.98"
    higher_is_better: true
  - id: V-gold-karaka
    check: every exported AnnotatedSentence has non-empty karaka_parse covering all content words
    threshold: "== 1.00"
  - id: V-transitivity
    check: akarmaka dhatu never paired with karma (ROLE_DHATUS fix); 0 violations on fixture
    threshold: "== 0"
  - id: V-sandhi-honest
    check: sandhi misses emitted as meta.sandhi=partial (space-separated), 0 fabricated fusions
    threshold: "== 0 fabricated"
  - id: V-fixture-size
    check: data/fixtures/paninian_v1.jsonl lines with gold karaka
    threshold: ">= 10000"
  - id: V-gb10
    check: infra/dgx_spark/Dockerfile.verified + gb10-validation md; >=100 realizer sentences in container (native, GPU)
    threshold: pass
artifacts:
  - data/fixtures/paninian_v1.jsonl (+ manifest hashes)
  - docs/infra/gb10-validation-2026-06.md
  - workstream closure JSON + Tarka memo
six_layer_closure:
  scientific: realizer produces grammatical Sanskrit with gold karaka; ADR-0033 cited
  technical: make gate green; module cov >=80%; GPU-only path enforced
  empirical: acceptance/coverage measured on n>=2000, recorded in ledger
  integrity: Tarka memo (sandhi honesty, no Saṃsādhanī leak, derivability basis)
  memory: ADR-0033 + fixture manifest in ledger
  signoff: GATE 2 human sign-off at standalone closure
out_of_scope: [paribhasha, dyck math, training loops, matrix.py]
sign_off: standalone closure approved by human (GATE 2)
