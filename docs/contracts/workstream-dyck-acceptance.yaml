workstream_id: dyck-control
branch: workstream/dyck-control
fork_from: origin/main
purpose: >
  Rigorous matched k-Shuffle Dyck control (L0): Hu et al. replication and re-match to
  REAL Vidyut-realized sentence-level statistics so the B/C contrast is fair.
owns:
  - hu_replication_config() (ADR-0025) with citation
  - match_dyck re-fit to real sentence-level Paninian stats (from vidyut realizer)
  - DyckSentenceSource standalone tests + property tests
  - manifest dyck_config blob per arm C / h1p:C / comp:*:C
depends_on: [vidyut-realize]   # real sentence-level stats vector (rematch before H1' battery)
hard_constraints:
  gpu_only: true               # standalone tests are device-free, but any reported run is GPU-runnable on GB10
  no_mock: true                # match against REAL realized stats, not cached proxy stats
acceptance:
  - id: D-bracket-valid
    check: generated sequences are well-formed (balanced) brackets
    threshold: "10^5 sequences, 0 invalid"
  - id: D-match-eps
    check: best matched config within epsilon of REAL vidyut sentence-level targets on DEFAULT_KEYS
    threshold: "<= eps (eps recorded in closure report)"
    higher_is_better: false
  - id: D-hu-pin
    check: hu_replication_config fields match ADR-0025 Hu pin (k cap per ASCII alphabet)
    threshold: pass
  - id: D-standalone
    check: worktree tests run standalone (no torch/Saṃsādhanī import required), GPU-runnable
    threshold: pass
artifacts:
  - configs/data/dyck_matched_<hash>.yaml
  - match report (distance on DEFAULT_KEYS vs real stats)
  - workstream closure JSON + Tarka memo
six_layer_closure:
  scientific: control matched to real sentence-level structure; ADR-0025 cited
  technical: make gate green; property tests; cov >=80%
  empirical: match distance measured vs real vidyut stats, recorded in ledger
  integrity: Tarka memo (control is a fair structural twin, not weaker/stronger)
  memory: ADR-0025 + matched config hash in record
  signoff: GATE 2 human sign-off
out_of_scope: [Vidyut/Paribhasha changes, training loops, matrix.py, retro-editing frozen phase-2 configs]
sign_off: standalone closure approved by human (GATE 2)
