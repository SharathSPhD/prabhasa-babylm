workstream_id: measurement
branch: workstream/measurement
fork_from: origin/main
purpose: >
  Make H1' a FAIR TEST (ADR-0035): GPU-only, no-mock battery on official EWoK/BLiMP with
  corrected paired statistics and an information-parity preflight that BLOCKS GPU training
  until the prior is shown to carry real signal.
owns:
  - device resolver (fail hard without CUDA; remove silent CUDA->CPU fallback)
  - removal of RunMode.MOCK / MockUniformBaseline from battery paths
  - official EWoK + full BLiMP-arg via invoke_official_zero_shot; ELC-PSALM PLL
  - comparison_tests fix (paired bootstrap on per-seed diffs)
  - held-out train/eval split + leakage (disjointness) check
  - real SentencePiece tokenizer + real budgets (>=130M downstream)
  - information-parity audit harness (ADR-0035 D6)
depends_on: []               # harness is generator-independent
hard_constraints:
  gpu_only: true             # battery raises without CUDA
  no_mock: true              # smoke venues stamped evidence=false, never emit a verdict
acceptance:
  - id: M-no-cpu
    check: battery aborts (non-zero) when CUDA unavailable; no silent CPU fallback in battery path
    threshold: pass
  - id: M-no-mock
    check: RunMode.MOCK / MockUniformBaseline removed from battery; smoke venues cannot emit a verdict
    threshold: pass
  - id: M-paired-stats
    check: paired bootstrap on per-seed differences matches hand-checked reference; independent-resample path removed
    threshold: pass
  - id: M-official-venue
    check: official EWoK + full BLiMP-arg via invoke_official_zero_shot; ELC-PSALM PLL (not causal logprob)
    threshold: pass
  - id: M-leakage
    check: train/eval string-set disjointness check fails closed on overlap
    threshold: "0 overlap"
  - id: M-seeds
    check: gating contrasts use >=10 seeds (n=3 only for wiring smokes)
    threshold: ">= 10"
  - id: M-info-parity
    check: information-parity audit returns PASS/FAIL across the six ADR-0035 D6 checks (H(struct|karaka)>>0, VISAYATA 100% transitive, templates>>2, accept>=target, venue off-saturation 0.55-0.75, zero mock/CPU paths)
    threshold: implemented + PASS on real data before any GPU training
artifacts:
  - information-parity audit report
  - battery closure JSON (official-shard PLL, evidence-grade)
  - workstream closure JSON + Tarka memo
six_layer_closure:
  scientific: the harness can detect a real effect off-saturation; ADR-0035 cited
  technical: make gate green; GPU-only enforced; mock/CPU paths scanned out
  empirical: paired-diff CI validated; official PLL smoke produces real numbers
  integrity: Tarka memo (no leakage, no mock, correct paired statistics)
  memory: ADR-0035 + audit report in record
  signoff: GATE 2 human sign-off; GATE 3 gates GPU training
out_of_scope: [generator/renderer changes, H1' scientific interpretation]
sign_off: standalone closure approved by human (GATE 2)
