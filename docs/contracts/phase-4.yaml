phase_id: phase-4-h2
purpose: >
  H2 Nyāya scaffold: lower fallacious-inference rates, and test the H1xH2 synergy
  — is a grammar-structured base more sample-efficient to scaffold than a generic
  base of the same size?
arms:
  - deepseek_r1_8b_nyaya        # absolute ceiling (Pramana Stage 2 continuity)
  - psalm_1b_nyaya              # treatment
  - generic_1b_nyaya            # matched control (TinyLlama-1B)
go_no_go:
  metric: sample_efficiency_advantage
  description: >
    Fewer fine-tuning examples for PSALM-base than Generic-1B to reach the same
    Nyāya reasoning quality (examples-to-target), AND a reduced fallacious-
    inference rate vs the unscaffolded base.
  threshold: 0.0   # PSALM requires strictly fewer examples; set precise target in-phase via ADR
  higher_is_better: true
  statistics: [bootstrap_ci, permutation_test]
data:
  examples: 55 -> 500
  quality_tiers: [gold, silver, bronze]
  pipeline: [sft_unsloth_qlora, grpo_with_nyaya_prm]
eval_suites:
  reasoning: [fallacious_inference_rate, six_phase_trace_validity, vyapti_probe]
artifacts:
  - scaffolded model variants published to HF with cards
  - paper H2 section drafted FROM the finding; synergy figure
fairness:
  - PSALM-1B and Generic-1B matched on size + scaffold + data + eval
sign_off: H2 interpretation approved by human
