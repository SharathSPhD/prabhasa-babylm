workstream_id: paribhasha-core
branch: workstream/paribhasha-core
fork_from: origin/main
purpose: >
  Faithful Vyutpattivada Śabdabodha (ADR-0034): real semantics + LOSSLESS render that
  carries information BEYOND the karaka parse — not an isomorphic relabel.
owns:
  - lossless renderer (every edge incl. VISAYATA survives)
  - serialize_line branch emitting paribhasha_string (not Sanskrit)
  - padartha assignment from morphology; visesana->visesyata/prakarata
  - karaka-specific graph topology; akanksa/yogyata/asatti gates
  - dual-task aligned export paribhasha_aligned_v1
  - coverage ledger per rule_id; open vocabulary tied to padartha inventory
depends_on: [vidyut-realize]   # consumes AnnotatedSentence with gold karaka
hard_constraints:
  gpu_only: true
  no_mock: true                # no toy 17-label lexicon; no synthetic AVACCHEDAKA boilerplate
acceptance:
  - id: P-visaya-lossless
    check: VISAYATA present in 100% of transitive paribhasha_string; round-trip tests pass on AVACCHEDAKA+VISAYATA+SAMYOGATA graphs
    threshold: "== 1.00"
    higher_is_better: true
  - id: P-info-parity
    check: conditional entropy H(structure | karaka) on >=10^4 frames
    threshold: ">> 0 (not ~0; relabel => FAIL)"
  - id: P-template-count
    check: unique structural template count on >=10^4 frames
    threshold: ">> 2"
  - id: P-serialize
    check: serialize_line emits paribhasha_string for PARIBHASHA/SHABDABODHA_ALIGNED (proven by test), never sentence.text
    threshold: pass
  - id: P-padartha
    check: padartha assignment derived from morphology (not all-DRAVYA); >1 category observed on mixed corpus
    threshold: ">= 3 categories used"
  - id: P-coverage-ledger
    check: per-rule_id success rate reported over construction classes (transitive/intransitive/ditransitive/locative/copular)
    threshold: published (M-level, no STOP)
artifacts:
  - data/fixtures/paribhasha_aligned_v1.jsonl (lossless)
  - rule_id coverage ledger
  - workstream closure JSON + Tarka memo
six_layer_closure:
  scientific: prior carries semantics beyond karaka (H(structure|karaka)>>0); ADR-0034 cited
  technical: make gate green; round-trip property tests; cov >=80%
  empirical: VISAYATA coverage, entropy, template count measured on 10^4 frames
  integrity: Tarka memo (relabel risk addressed; object role survives; no toy lexicon)
  memory: ADR-0034 + coverage ledger in record
  signoff: GATE 2 human sign-off
out_of_scope: [Saṃsādhanī, dyck, GB10 torch build, matrix.py, H1' battery execution]
sign_off: standalone closure approved by human (GATE 2)
